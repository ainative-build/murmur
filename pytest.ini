[pytest]
# Pytest configuration for Murmur Bot tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Minimum Python version
minversion = 7.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -m "not integration"

# Test markers (must live inside [pytest] section to be picked up)
markers =
    asyncio: mark test as async (deselect with '-m "not asyncio"')
    unit: mark test as a unit test
    integration: mark test as an integration test (requires Postgres)
    slow: mark test as slow running
    live: mark test as a live API test (requires real credentials, opt-in only)

# Coverage options
[coverage:run]
omit =
    tests/*
    baml_client/*
    .venv/*
    __pycache__/*
