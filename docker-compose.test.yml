services:
  test-db:
    image: postgres:15.4
    container_name: murmur-test-db
    environment:
      POSTGRES_USER: murmur
      POSTGRES_PASSWORD: murmur
      POSTGRES_DB: murmur_test
    ports:
      - "${MURMUR_TEST_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U murmur -d murmur_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
